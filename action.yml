name: "UPM Release"
description: "Creates a Unity package branch, and optionally creates a signed release tar ball."
inputs:
  package-root:
    description: "The root directory of the package to be released, relative to the repository root."
    required: false
    default: "*/Packages/*/package.json"
  branch-name:
    description: "The name of the branch to be created for the release."
    required: false
    default: "upm"
  skip-ci:
    description: "Whether to skip CI for the commit that creates the release branch."
    required: false
    default: "true"
  remove-tests:
    description: "Whether to remove the Tests folder from the release branch."
    required: false
    default: "true"
  keep-samples:
    description: "Whether to keep the Assets/Samples folder in the release branch."
    required: false
    default: "true"
  samples-destination:
    description: "The destination path where the package samples that will be moved to 'Samples~' are location."
    required: false
    default: "Assets/Samples"

runs:
  using: "composite"
  steps:
    - name: Create branch
      run: |
        PKG_LOC=$(find . -path '*/Packages/*/package.json' -exec dirname {} \; | head -1 | sed 's|^\./||') 
        echo "Package location: $PKG_LOC"
        git branch -d "$BRANCH_NAME" &> /dev/null || echo "$BRANCH_NAME branch not found"
        git subtree split -P "$PKG_LOC" -b "$BRANCH_NAME"
        if [[ "${{ inputs.keep-samples }}" == 'true' && -d "$SAMPLES_DESTINATION" ]]; then
          mv "$SAMPLES_DESTINATION" /tmp/example
        fi
        if [[ -f "CHANGELOG.md" ]]; then
          mv CHANGELOG.md /tmp/CHANGELOG.md
        fi
        if [[ -f "LICENSE" ]]; then
          mv LICENSE /tmp/LICENSE
        fi
        if [[ -f "README.md" ]]; then
          mv README.md /tmp/README.md
        fi
        git checkout "$BRANCH_NAME"
        if [[ -f "/tmp/README.md" ]]; then
          mv /tmp/README.md README.md
          git add README.md
        fi
        if [[ -d "/tmp/example" ]]; then
          mkdir "Samples~"
          mv /tmp/example/* "Samples~/"
          git add "Samples~"
        fi
        if [[ -f "/tmp/CHANGELOG.md" ]]; then
          mv /tmp/CHANGELOG.md CHANGELOG.md
          git add CHANGELOG.md
        fi
        if [[ -f "/tmp/LICENSE" ]]; then
          mv /tmp/LICENSE LICENSE
          git add LICENSE
        fi
        if [[ "${{ inputs.remove-tests }}" == 'true' && -d "Tests" ]]; then
          rm -rf Tests
          rm -f Tests.meta
        fi
        git config --global user.name 'github-bot'
        git config --global user.email 'github-bot@users.noreply.github.com'
        MSG="${{ inputs.skip-ci == 'true' && 'chore: create upm package [skip ci]' || 'chore: create upm package' }}"
        git commit -am "$MSG"
        git push -f -u origin "$BRANCH_NAME"
      shell: bash
      env:
        PKG_ROOT: ${{ inputs.package-root }}
        BRANCH_NAME: ${{ inputs.branch-name }}
        SAMPLES_DESTINATION: ${{ inputs.samples-destination }}
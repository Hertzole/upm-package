name: "UPM Package"
description: "Creates a Unity package branch, and optionally creates a signed release tar ball."
inputs:
  package-json:
    description: "The path to the package.json file of the package to be released, relative to the repository root."
    required: false
    default: "*/Packages/*/package.json"
  create-branch:
    description: "Whether to create a separate branch for the package. If false, no branch will be created."
    required: false
    default: "true"
  branch-name:
    description: "The name of the branch to be created for the release."
    required: false
    default: "upm"
  skip-ci:
    description: "Whether to skip CI for the commit."
    required: false
    default: "true"
  remove-tests:
    description: "Whether to remove the Tests folder."
    required: false
    default: "true"
  include-samples:
    description: "Whether to keep the Assets/Samples folder."
    required: false
    default: "true"
  samples-destination:
    description: "The destination path where the package samples that will be moved to 'Samples~' are located."
    required: false
    default: "Assets/Samples"
  include-plugins:
    description: "Whether to keep the Plugins folder inside the package."
    required: false
    default: "true"
  signing-key-id:
    description: "Unity service account key ID with permissions to sign packages. Required if signing the package."
    required: false
  signing-key-secret:
    description: "Unity service account key secret with permissions to sign packages. Required if signing the package."
    required: false
  signing-org-id:
    description: "Unity organization ID that the service account belongs to. Required if signing the package."
    required: false

outputs:
  signed-archive:
    description: "The path to the signed package archive, if the package was signed."
    value: ${{ steps.sign-package.outputs.signed-archive }}
  created-archive:
    description: "Whether a signed package archive was created."
    value: ${{ steps.sign-package.outputs.signed-archive != '' }}

runs:
  using: "composite"
  steps:
    - name: Find package root
      id: find-package-root
      run: |
        package_directory=$(find . -path "${{ inputs.package-json }}" -exec dirname {} \; | head -1 | sed 's|^\./||')
        package_json_path="$package_directory/package.json"

        echo "PACKAGE_ROOT=$package_directory" >> "$GITHUB_ENV"
        echo "PACKAGE_JSON=$package_json_path" >> "$GITHUB_ENV"

        echo "Found package root: $package_directory"
        echo "Found package.json path: $package_json_path"
      shell: bash

    - name: Split package
      run: |
        git branch -d "$BRANCH_NAME" &> /dev/null || echo "$BRANCH_NAME branch not found"
        git subtree split -P "$PACKAGE_ROOT" -b "$BRANCH_NAME"
      shell: bash
      env:
        BRANCH_NAME: ${{ inputs.branch-name }}

    - name: Move files
      run: |
        if [[ -f ".gitignore" ]]; then
          cp .gitignore /tmp/.gitignore
        fi

        if [[ -f "CHANGELOG.md" ]]; then
          mv CHANGELOG.md /tmp/CHANGELOG.md
        fi

        if [[ -f "CHANGELOG" ]]; then
          mv CHANGELOG /tmp/CHANGELOG
        fi

        if [[ -f "LICENSE.md" ]]; then
          mv LICENSE.md /tmp/LICENSE.md
        fi

        if [[ -f "LICENSE" ]]; then
          mv LICENSE /tmp/LICENSE
        fi

        if [[ -f "README.md" ]]; then
          mv README.md /tmp/README.md
        fi

        if [[ -f "README" ]]; then
          mv README /tmp/README
        fi
      shell: bash

    - name: Move samples
      if: ${{ inputs.include-samples == 'true' }}
      run: |
        if [[ -d "$SAMPLES_DESTINATION" ]]; then
          mv "$SAMPLES_DESTINATION" /tmp/example
        fi
      shell: bash
      env:
        SAMPLES_DESTINATION: ${{ inputs.samples-destination }}

    - name: Move plugins
      if: ${{ inputs.include-plugins == 'true' }}
      run: |
        if [[ -d "Plugins" ]]; then
          mv "Plugins" /tmp/Plugins
        fi
      shell: bash

    - name: Checkout
      run: |
        git restore .
        git checkout "$BRANCH_NAME"
      shell: bash
      env:
        BRANCH_NAME: ${{ inputs.branch-name }}

    - name: Restore files
      run: |
        if [[ -f "/tmp/.gitignore" ]]; then
          cp /tmp/.gitignore .gitignore
        fi

        if [[ -f "/tmp/README.md" ]]; then
          mv -f /tmp/README.md README.md
          git add README.md
        fi

        if [[ -f "/tmp/README" ]]; then
          mv -f /tmp/README README
          git add README
        fi

        if [[ -f "/tmp/CHANGELOG.md" ]]; then
          mv -f /tmp/CHANGELOG.md CHANGELOG.md
          git add CHANGELOG.md
        fi

        if [[ -f "/tmp/CHANGELOG" ]]; then
          mv -f /tmp/CHANGELOG CHANGELOG
          git add CHANGELOG
        fi

        if [[ -f "/tmp/LICENSE.md" ]]; then
          mv -f /tmp/LICENSE.md LICENSE.md
          git add LICENSE.md
        fi

        if [[ -f "/tmp/LICENSE" ]]; then
          mv -f /tmp/LICENSE LICENSE
          git add LICENSE
        fi
      shell: bash

    - name: Restore samples
      if: ${{ inputs.include-samples == 'true' }}
      run: |
        if [[ -d "/tmp/example" ]]; then
          mkdir "Samples~"
          mv /tmp/example/* "Samples~/"
          git add "Samples~"
        fi
      shell: bash

    - name: Restore plugins
      if: ${{ inputs.include-plugins == 'true' }}
      run: |
        if [[ -d "/tmp/Plugins" ]]; then
          mkdir "Plugins" -p
          mv /tmp/Plugins/* "Plugins/"
          git add "Plugins"
        fi
      shell: bash

    - name: Remove tests
      if: ${{ inputs.remove-tests == 'true' }}
      run: |
        if [[ -d "Tests" ]]; then
          rm -rf Tests
          rm -f Tests.meta
        fi
      shell: bash

    - name: Commit branch
      if: ${{ inputs.create-branch == 'true' }}
      run: |
        git config --global user.name 'github-bot'
        git config --global user.email 'github-bot@users.noreply.github.com'
        MSG="${{ inputs.skip-ci == 'true' && 'chore: create upm package [skip ci]' || 'chore: create upm package' }}"
        git commit -am "$MSG"
        git push -f -u origin "$BRANCH_NAME"
      shell: bash
      env:
        BRANCH_NAME: ${{ inputs.branch-name }}

    - name: Read package metadata
      if: ${{ inputs.signing-key-id && inputs.signing-key-secret && inputs.signing-org-id }}
      run: |
        package_name="$(jq -r '.name' "package.json")"
        package_version="$(jq -r '.version' "package.json")"

        echo "SIGNING_DIST_DIR=/tmp/signed-upm-dist" >> "$GITHUB_ENV"
        echo "PACKAGE_NAME=$package_name" >> "$GITHUB_ENV"
        echo "PACKAGE_VERSION=$package_version" >> "$GITHUB_ENV"

        printf 'Package name: %s\n' "$package_name"
        printf 'Package version: %s\n' "$package_version"
      shell: bash

    - name: Install Unity UPM CLI
      if: ${{ inputs.signing-key-id && inputs.signing-key-secret && inputs.signing-org-id }}
      run: |
        curl -fsSL https://cdn.packages.unity.com/upm-cli/install.sh -o install.sh
        bash install.sh
        echo "$HOME/.upm/bin" >> "$GITHUB_PATH"
        rm install.sh
      shell: bash

      # Create a .npmignore file to prevent other stuff from being included.
    - name: Create ignore file
      run: |
        {
          echo "**/[Bb]in/**"
          echo "**/[Oo]bj/**"
          echo "**/[Ll]ib/**"
          echo "**/[Ll]ogs/**"
          echo "**/[Tt]emp/**"
          echo "**/*.ulf"
          echo "*.ulf"
        } > .gitignore
      shell: bash

    - name: Sign package
      if: ${{ inputs.signing-key-id && inputs.signing-key-secret && inputs.signing-org-id }}
      run: |
        if [[ -f ".gitignore" ]]; then
          cp /tmp/.gitignore .gitignore
        fi
        mkdir -p "$SIGNING_DIST_DIR"
        upm pack ./ --organization-id "${{ inputs.signing-org-id }}" --destination "$SIGNING_DIST_DIR"
      shell: bash
      env:
        UPM_SERVICE_ACCOUNT_KEY_ID: ${{ inputs.signing-key-id }}
        UPM_SERVICE_ACCOUNT_KEY_SECRET: ${{ inputs.signing-key-secret }}
        UPM_ORG_ID: ${{ inputs.signing-org-id }}

    - name: Print signed package info
      if: ${{ inputs.signing-key-id && inputs.signing-key-secret && inputs.signing-org-id }}
      id: sign-package
      run: |
        shopt -s nullglob
        archives=("$SIGNING_DIST_DIR"/*.tgz "$SIGNING_DIST_DIR"/*.tar.gz)
        if [ "${#archives[@]}" -ne 1 ]; then
          echo "Expected exactly one signed package archive, found ${#archives[@]}" >&2
          exit 1
        fi

        archive="${archives[0]}"
        listing=$(tar -tzf "$archive")

        if ! grep -Fqx 'package/package.json' <<< "$listing"; then
          echo "ERROR: package/package.json not found in archive" >&2
          exit 1
        fi
        if ! grep -Fqx 'package/.attestation.p7m' <<< "$listing"; then
          echo "ERROR: package/.attestation.p7m not found in archive" >&2
          exit 1
        fi

        echo "PACKAGE_ARCHIVE=$archive" >> "$GITHUB_ENV"
        echo "signed-archive=$archive" >> "$GITHUB_OUTPUT"
        echo "Archive: $(basename "$archive")"
        tar -xOzf "$archive" package/package.json | jq '{name, version}'
      shell: bash

    - name: Return to original branch
      if: ${{ env.ORIGINAL_BRANCH }}
      run: |
        if [[ -f ".gitignore" ]]; then
          rm -f .gitignore
        fi
        if [[ -f ".npmignore" ]]; then
          rm -f .npmignore
        fi
        git checkout "$ORIGINAL_BRANCH"
      shell: bash
      env:
        ORIGINAL_BRANCH: ${{ github.ref_name }}
